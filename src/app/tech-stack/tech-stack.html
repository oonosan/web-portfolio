<section class="px-6 mb-20" id="tech">
    <div class="mb-10">
      <h3 class="font-headline text-[1.75rem] font-extrabold tracking-tight mb-4">Tech Stack</h3>
      <p class="text-on-surface-variant text-sm leading-relaxed max-w-md">
        Extensive experience delivering solutions across Healthcare, Tax, Financial, and Wellness
        industries. Proven track record in team leadership and process improvement.
      </p>
    </div>
    <div class="space-y-8">
      <div>
        @for(tech of techStacks; track tech.name) {
          <h4 class="font-headline text-xs font-bold tracking-widest text-primary uppercase mb-4">
            {{ tech.name }}
          </h4>
          <div class="flex flex-wrap gap-2">
            @for(tool of tech.technologies; track tool) {
              <span class="perspective-chip">{{tool}}</span>
            }
          </div>
        }
      </div>
    </div>
  </section>
