<!-- TopAppBar -->
<header
  class="fixed top-0 w-full z-50 bg-[#0e0e0e]/70 backdrop-blur-xl flex justify-between items-center px-6 py-4"
>

    <h1 class="text-xl font-black tracking-tighter text-white font-['Manrope'] uppercase">
      KAREN ONO

</header>

<main class="pt-24 pb-32">

  <section class="px-6 mb-16">
    <div class="mb-4">
      <span class="font-label text-[0.6875rem] font-bold tracking-[0.2em] text-primary uppercase"

      >
    </div>
    <h2

   <about-me></about-me>
